name: Auto-Generated-Pipeline
'on':
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: 0 * * * *
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Dependencies
        run: |
          if ! command -v npm > /dev/null 2>&1; then npm install -g npm; fi
          npm ci

      - name: Run Tests
        run: pytest

      - name: Check Code Quality
        run: flake8

      - name: Security check
        run: |
          case "npm_audit" in
            npm_audit) npm audit --audit-level=high ;;
            trivy) docker run --rm -v /var/run/docker.sock:/var/run/docker.sock -v $PWD:/src aquasec/trivy fs --exit-code 1 /src ;;
            codeql) echo "Add CodeQL action step manually if needed" ;;
            *) npm audit --audit-level=high ;;
          esac

      - name: Build Project
        run: python -m build
